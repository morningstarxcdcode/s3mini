services:
  ceph:
    image: quay.io/ceph/demo:latest-quincy
    container_name: ceph-test
    volumes:
      - type: tmpfs
        target: /var/lib/ceph
        tmpfs:
          size: 1G
      - type: tmpfs
        target: /etc/ceph
        tmpfs:
          size: 100M
    ports:
      - 7480:8080 # RGW (S3/Swift) - using 8080 internally
    restart: always
    environment:
      # Minimal demo configuration
      CEPH_DEMO_UID: test
      CEPH_DEMO_ACCESS_KEY: testkey
      CEPH_DEMO_SECRET_KEY: testsecret
      CEPH_DEMO_BUCKET: testbucket
      NETWORK_AUTO_DETECT: 4
      CEPH_DAEMON: demo
      DEMO_DAEMONS: mon,mgr,osd,rgw
      CEPH_DASHBOARD_ENABLED: 0
      OSD_OBJECTSTORE: memstore
      OSD_COUNT: 1
      MON_CLOCK_DRIFT_ALLOWED: 1
      RGW_CIVETWEB_PORT: 8080
      CEPH_CONF_OVERRIDES: |
        [global]
        mon_warn_on_pool_no_redundancy = false
        mon_warn_on_insecure_global_id_reclaim_allowed = false
        osd_pool_default_size = 1
        osd_pool_default_min_size = 1
        osd_crush_chooseleaf_type = 0
        osd_journal_size = 100
        mon_compact_on_trim = false
        mgr/dashboard/server_port = 8443
        rgw_enable_usage_log = false
        debug_ms = 0
        debug_osd = 0
        debug_mon = 0
    healthcheck:
      test: ['CMD', 'ceph', 'health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    mem_limit: 2g
    cpus: '1.0'
networks:
  default:
    driver: bridge
